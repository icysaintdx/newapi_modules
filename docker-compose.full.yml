version: '3.8'

# 完整的 New-API 增强功能 Docker Compose 配置
# 包含渠道状态监控和支付系统
# 注意：此配置假设 New-API 已经部署在 new-api_new-api-network 网络中

services:
  # 渠道状态监控
  channel-status:
    image: channel-status
    container_name: channel-status
    restart: unless-stopped
    ports:
      - "2086:8080"
    environment:
      # 连接 New-API 的 PostgreSQL 数据库
      - DATABASE_URL=postgresql://root:123456@postgres:5432/new-api?sslmode=disable
    networks:
      - new-api-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 支付系统
  paypro:
    build: ./paypro
    container_name: paypro
    restart: unless-stopped
    ports:
      - "8889:8889"
    volumes:
      - ./paypro/logs:/app/logs
      - ./paypro/src:/app/src
    depends_on:
      - paypro-mysql
    networks:
      - new-api-network

  # PayPro 专用 MySQL
  paypro-mysql:
    image: mysql:5.7
    container_name: paypro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: paypro
    ports:
      - "3307:3306"
    volumes:
      - paypro-mysql-data:/var/lib/mysql
      - ./paypro/init_all_configs.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - new-api-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

networks:
  # 连接到 New-API 的网络
  # 如果 new-api 网络不存在，先创建：docker network create new-api_new-api-network
  new-api-network:
    external: true
    name: new-api_new-api-network

volumes:
  paypro-mysql-data:
    driver: local
