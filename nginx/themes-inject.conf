# 主题注入配置
# 通过 sub_filter 在 HTML 中注入主题切换器和自定义样式

# 注意：此配置需要在 newapi.conf 的 location / 块中添加

# 在 newapi.conf 的 location / 中添加以下内容：
#
# location / {
#     # ... 其他配置 ...
#
#     # 启用主题注入
#     sub_filter '</head>' '<link rel="stylesheet" href="/themes/theme-switcher.css"><script src="/themes/theme-switcher.js"></script></head>';
#     sub_filter_once on;
#     sub_filter_types text/html;
#
#     # 必须关闭 gzip，否则 sub_filter 不生效
#     proxy_set_header Accept-Encoding "";
# }

# 主题文件目录结构：
# /docker/newapi-enhancements/themes/
# ├── animated/
# ├── cartoon/
# ├── dark/
# ├── light/
# ├── pixel/
# ├── tech/
# ├── theme-switcher.js    # 主题切换脚本
# └── theme-switcher.css   # 主题切换器样式
