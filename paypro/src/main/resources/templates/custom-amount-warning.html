<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温馨提示 - ISaintPay</title>
    <link href="/css/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .notice-container {
            max-width: 500px;
            width: 100%;
        }
        .notice-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .notice-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .notice-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 16px;
        }
        .notice-message {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .notice-tip {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--primary-color);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 30px;
        }
        .notice-tip-title {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .notice-tip-content {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }
        .amount-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .amount-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 500;
        }
        .notice-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .notice-footer {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .notice-card {
                padding: 30px 20px;
            }
            .notice-actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .amount-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="notice-container">
        <div class="glass notice-card">
            <div class="notice-icon">💡</div>
            <h1 class="notice-title">温馨提示</h1>
            <p class="notice-message">
                当前不支持自定义金额充值<br>
                请返回充值页面选择固定额度重新下单
            </p>
            <div class="notice-tip">
                <div class="notice-tip-title">
                    <i class="ri-money-dollar-circle-line"></i>
                    支持的充值额度
                </div>
                <div class="notice-tip-content">
                    为了确保支付流程顺畅，我们提供以下固定充值额度：
                    <div class="amount-list">
                        <div class="amount-item">¥10</div>
                        <div class="amount-item">¥20</div>
                        <div class="amount-item">¥50</div>
                        <div class="amount-item">¥100</div>
                        <div class="amount-item">¥300</div>
                        <div class="amount-item">¥500</div>
                    </div>
                </div>
            </div>
            <div class="notice-actions">
                <button class="btn btn-primary" onclick="window.close()">
                    <i class="ri-close-line"></i>
                    关闭页面
                </button>
            </div>
            <div class="notice-footer">
                未生成支付订单，可直接关闭此页面
            </div>
        </div>
    </div>
</body>
</html>
