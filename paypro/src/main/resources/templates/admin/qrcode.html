<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码管理 - PayPro</title>
    <script src="/js/vue.global.min.js"></script>
    <link href="/css/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: var(--glass-border);
            color: var(--text-color);
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 30px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu {
            list-style: none;
        }

        .menu-item {
            margin: 8px 16px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 500;
        }

        .menu-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        .menu-link.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            color: var(--text-color);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .menu-link i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .main {
            flex: 1;
            margin-left: 280px;
            padding: 24px;
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 20px;
            color: var(--text-color);
            font-weight: 600;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-header {
            padding: 24px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            font-size: 16px;
            color: var(--text-color);
            font-weight: 600;
        }

        .card-body {
            padding: 28px;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .qrcode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .qrcode-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .qrcode-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .qrcode-preview {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 8px;
            background: white;
            margin-bottom: 12px;
        }

        .qrcode-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .qrcode-field {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qrcode-field label {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 60px;
        }

        .qrcode-field input, .qrcode-field select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 14px;
        }

        .qrcode-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="layout">
            <aside class="sidebar">
                <div class="logo">
                    <h1><i class="ri-dashboard-line"></i> PayPro</h1>
                    <p>后台管理系统</p>
                </div>

                <ul class="menu">
                    <li class="menu-item" v-for="menu in menus" :key="menu.id">
                        <a :href="menu.path" class="menu-link" :class="{active: currentPage === 'qrcode'}">
                            <i :class="menu.icon"></i>
                            <span>{{ menu.name }}</span>
                        </a>
                    </li>
                </ul>
            </aside>

            <main class="main">
                <header class="header">
                    <h2>二维码管理</h2>
                </header>

                <div class="card">
                    <div class="card-header">
                        <h3>上传二维码</h3>
                    </div>
                    <div class="card-body">
                        <div class="upload-area"
                             @click="triggerFileInput"
                             @dragover.prevent="handleDragOver"
                             @dragleave.prevent="handleDragLeave"
                             @drop.prevent="handleDrop"
                             :class="{dragover: isDragging}">
                            <i class="ri-upload-cloud-2-line upload-icon"></i>
                            <p style="color: var(--text-color); margin-bottom: 8px;">点击或拖拽上传二维码图片</p>
                            <p style="color: var(--text-muted); font-size: 14px;">支持批量上传 PNG、JPG 格式</p>
                            <input type="file"
                                   ref="fileInput"
                                   multiple
                                   accept="image/png,image/jpeg,image/jpg"
                                   @change="handleFileSelect"
                                   style="display: none;">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>已上传的二维码 ({{ filteredQrCodes.length }})</h3>
                        <button class="btn btn-primary btn-sm" @click="saveAll">
                            <i class="ri-save-line"></i> 保存全部
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="filter-bar">
                            <select v-model="filterPayType">
                                <option value="">全部支付方式</option>
                                <option value="alipay">支付宝</option>
                                <option value="wechat">微信</option>
                            </select>
                            <select v-model="filterQrType">
                                <option value="">全部类型</option>
                                <option value="normal">普通收款码</option>
                                <option value="fixed">固定金额</option>
                            </select>
                            <select v-model="filterAmount" v-if="filterQrType === 'fixed' || filterQrType === ''">
                                <option value="">全部金额</option>
                                <option v-for="amount in uniqueAmounts" :key="amount" :value="amount">
                                    {{ amount }} 元
                                </option>
                            </select>
                        </div>

                        <div class="qrcode-grid">
                            <div class="qrcode-item" v-for="qr in filteredQrCodes" :key="qr.id">
                                <img :src="qr.preview" class="qrcode-preview" :alt="qr.fileName">

                                <div class="qrcode-info">
                                    <div class="qrcode-field">
                                        <label>文件名</label>
                                        <input type="text" :value="qr.fileName" readonly>
                                    </div>

                                    <div class="qrcode-field">
                                        <label>支付方式</label>
                                        <select v-model="qr.payType">
                                            <option value="alipay">支付宝</option>
                                            <option value="wechat">微信</option>
                                        </select>
                                    </div>

                                    <div class="qrcode-field">
                                        <label>类型</label>
                                        <select v-model="qr.qrType" @change="handleTypeChange(qr)">
                                            <option value="normal">普通收款码</option>
                                            <option value="fixed">固定金额</option>
                                        </select>
                                    </div>

                                    <div class="qrcode-field" v-if="qr.qrType === 'fixed'">
                                        <label>金额(元)</label>
                                        <input type="number" v-model.number="qr.amount" step="0.01" min="0.01">
                                    </div>

                                    <div class="qrcode-field" v-if="qr.qrType === 'fixed'">
                                        <label>编号</label>
                                        <input type="number" v-model.number="qr.qrNum" min="1">
                                    </div>
                                </div>

                                <div class="qrcode-actions">
                                    <button class="btn btn-success btn-sm" @click="saveQrCode(qr)" v-if="!qr.saved">
                                        <i class="ri-save-line"></i> 保存
                                    </button>
                                    <button class="btn btn-danger btn-sm" @click="deleteQrCode(qr)">
                                        <i class="ri-delete-bin-line"></i> 删除
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div v-if="filteredQrCodes.length === 0" style="text-align: center; padding: 40px; color: var(--text-muted);">
                            <i class="ri-image-line" style="font-size: 48px; margin-bottom: 16px;"></i>
                            <p>暂无二维码，请上传</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    currentPage: 'qrcode',
                    menus: [],
                    qrCodes: [],
                    isDragging: false,
                    filterPayType: '',
                    filterQrType: '',
                    filterAmount: '',
                    nextId: 1
                };
            },
            computed: {
                filteredQrCodes() {
                    return this.qrCodes.filter(qr => {
                        if (this.filterPayType && qr.payType !== this.filterPayType) return false;
                        if (this.filterQrType && qr.qrType !== this.filterQrType) return false;
                        if (this.filterAmount && qr.amount != this.filterAmount) return false;
                        return true;
                    });
                },
                uniqueAmounts() {
                    const amounts = [...new Set(this.qrCodes
                        .filter(qr => qr.qrType === 'fixed' && qr.amount > 0)
                        .map(qr => qr.amount))];
                    return amounts.sort((a, b) => a - b);
                }
            },
            mounted() {
                this.loadMenus();
                this.loadQrCodes();
            },
            methods: {
                async loadMenus() {
                    const stored = localStorage.getItem('adminMenus');
                    if (stored) {
                        try {
                            this.menus = JSON.parse(stored);
                        } catch (e) {
                            console.error('解析菜单缓存失败:', e);
                        }
                    }
                },

                async loadQrCodes() {
                    try {
                        const response = await fetch('/admin/api/qrcode/list');
                        const result = await response.json();
                        if (result.code === 200) {
                            this.qrCodes = result.data.map(qr => ({
                                id: qr.id,
                                fileName: qr.fileName,
                                payType: qr.payType,
                                qrType: qr.amount > 0 ? 'fixed' : 'normal',
                                amount: qr.amount || 0,
                                qrNum: qr.qrNum || 1,
                                preview: qr.filePath,
                                saved: true
                            }));
                            this.nextId = Math.max(...this.qrCodes.map(q => q.id), 0) + 1;
                        }
                    } catch (error) {
                        console.error('加载二维码列表失败:', error);
                    }
                },

                triggerFileInput() {
                    this.$refs.fileInput.click();
                },

                handleDragOver(e) {
                    this.isDragging = true;
                },

                handleDragLeave(e) {
                    this.isDragging = false;
                },

                handleDrop(e) {
                    this.isDragging = false;
                    const files = Array.from(e.dataTransfer.files);
                    this.processFiles(files);
                },

                handleFileSelect(e) {
                    const files = Array.from(e.target.files);
                    this.processFiles(files);
                    e.target.value = '';
                },

                processFiles(files) {
                    files.forEach(file => {
                        if (!file.type.startsWith('image/')) return;

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            this.qrCodes.push({
                                id: this.nextId++,
                                fileName: file.name,
                                payType: 'alipay',
                                qrType: 'normal',
                                amount: 0,
                                qrNum: 1,
                                preview: e.target.result,
                                file: file,
                                saved: false
                            });
                        };
                        reader.readAsDataURL(file);
                    });
                },

                handleTypeChange(qr) {
                    if (qr.qrType === 'normal') {
                        qr.amount = 0;
                        qr.qrNum = 1;
                    } else if (qr.qrType === 'fixed') {
                        qr.amount = 10;
                        qr.qrNum = this.getNextQrNum(qr.payType);
                    }
                },

                getNextQrNum(payType) {
                    const existing = this.qrCodes.filter(qr => qr.payType === payType);
                    if (existing.length === 0) return 1;
                    return Math.max(...existing.map(qr => qr.qrNum)) + 1;
                },

                async saveQrCode(qr) {
                    if (!qr.file) {
                        alert('该二维码已保存');
                        return;
                    }

                    // 验证固定金额类型必须设置金额
                    if (qr.qrType === 'fixed' && (!qr.amount || qr.amount <= 0)) {
                        alert('固定金额类型必须设置金额');
                        return;
                    }

                    const formData = new FormData();
                    formData.append('file', qr.file);
                    formData.append('payType', qr.payType);
                    formData.append('amount', qr.qrType === 'normal' ? 0 : qr.amount);
                    formData.append('qrNum', qr.qrType === 'normal' ? 1 : qr.qrNum);

                    try {
                        const response = await fetch('/admin/api/qrcode/upload', {
                            method: 'POST',
                            body: formData
                        });
                        const result = await response.json();
                        if (result.code === 200) {
                            qr.saved = true;
                            qr.id = result.data.id;
                            qr.preview = result.data.filePath;
                            delete qr.file;
                            alert('保存成功');
                        } else {
                            alert('保存失败: ' + result.message);
                        }
                    } catch (error) {
                        console.error('保存二维码失败:', error);
                        alert('保存失败，请重试');
                    }
                },

                async saveAll() {
                    const unsaved = this.qrCodes.filter(qr => !qr.saved);
                    if (unsaved.length === 0) {
                        alert('没有需要保存的二维码');
                        return;
                    }

                    for (const qr of unsaved) {
                        await this.saveQrCode(qr);
                    }
                },

                async deleteQrCode(qr) {
                    if (!confirm('确定要删除这个二维码吗？')) return;

                    if (qr.saved) {
                        try {
                            const response = await fetch(`/admin/api/qrcode/delete/${qr.id}`, {
                                method: 'DELETE'
                            });
                            const result = await response.json();
                            if (result.code === 200) {
                                this.qrCodes = this.qrCodes.filter(q => q.id !== qr.id);
                                alert('删除成功');
                            } else {
                                alert('删除失败: ' + result.message);
                            }
                        } catch (error) {
                            console.error('删除二维码失败:', error);
                            alert('删除失败，请重试');
                        }
                    } else {
                        this.qrCodes = this.qrCodes.filter(q => q.id !== qr.id);
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
