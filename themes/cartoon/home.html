<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saint Code - AI API Platform</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #f0f9ff 50%, #f5f0ff 100%);
            color: #5a4a4a;
            min-height: 100vh;
        }
        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid #ffb6c1;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff6b9d;
            text-shadow: 2px 2px 0 #ffd5e5;
        }
        .nav a {
            color: #8a7a7a;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .nav a:hover {
            background: #ffe4ec;
            color: #ff6b9d;
        }
        .hero {
            padding: 8rem 2rem 4rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: #ff6b9d;
            text-shadow: 3px 3px 0 #ffd5e5;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .hero h1 span {
            color: #7c9dff;
            text-shadow: 3px 3px 0 #d5e5ff;
        }
        .hero p {
            font-size: 1.25rem;
            color: #9a8a8a;
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff9ec4 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
        }
        .btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.5);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .feature-card {
            background: #fff;
            padding: 2rem;
            border-radius: 24px;
            border: 3px solid #ffe4ec;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255, 182, 193, 0.2);
        }
        .feature-card:hover {
            transform: translateY(-8px) rotate(1deg);
            border-color: #ff9ec4;
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.3);
        }
        .feature-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: #ff6b9d;
        }
        .feature-card p { color: #9a8a8a; line-height: 1.6; }
        .footer {
            background: #fff;
            padding: 3rem 2rem;
            text-align: center;
            border-top: 3px solid #ffe4ec;
        }
        .footer p { color: #caa; }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">Saint Code ✨</div>
        <nav class="nav">
            <a href="/">🏠 首页</a>
            <a href="#features">⭐ 功能</a>
            <a href="/about">📖 关于</a>
            <a href="https://isaint.cc/status/" target="_blank">📊 状态</a>
            <a href="/login">🔐 登录</a>
        </nav>
    </header>
    <section class="hero">
        <h1>打造你的 <span>AI API</span> 平台</h1>
        <p>✨ 聚合全球顶尖 AI 能力，统一 API 接口，简单接入，极致体验 ✨</p>
        <a href="/login" class="btn">🚀 立即开始</a>
    </section>
    <section class="features" id="features">
        <div class="feature-card">
            <h3>🚀 统一接口</h3>
            <p>一个 API 接入 40+ AI 提供商，无需分别对接各平台～</p>
        </div>
        <div class="feature-card">
            <h3>💰 成本优化</h3>
            <p>智能路由选择最优价格方案，大幅降低 AI 使用成本 ✨</p>
        </div>
        <div class="feature-card">
            <h3>⚡ 极速响应</h3>
            <p>全球多节点部署，低延迟高可用，保证服务稳定性 💫</p>
        </div>
        <div class="feature-card">
            <h3>🔒 安全可靠</h3>
            <p>企业级安全防护，数据加密传输，保护隐私安全 🛡️</p>
        </div>
    </section>
    <footer class="footer">
        <p>© 2026 Saint Code. Made with 💖</p>
    </footer>
</body>
</html>
