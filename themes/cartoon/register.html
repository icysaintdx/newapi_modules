<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Saint Code</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Fredoka', sans-serif; background: linear-gradient(135deg, #fff5f5 0%, #f0f9ff 50%, #f5f0ff 100%); color: #5a4a4a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; align-items: center; z-index: 100; }
        .top-bar .home-link { text-decoration: none; font-family: 'Fredoka', sans-serif; font-size: 1.5rem; font-weight: 700; color: #ff6b9d; text-shadow: 2px 2px 0 #ffd5e5; transition: all 0.3s; }
        .top-bar .home-link:hover { transform: scale(1.05); }
        .login-container { width: 100%; max-width: 420px; padding: 2rem; padding-top: 5rem; }
        .logo { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .logo a { text-decoration: none; color: #ff6b9d; text-shadow: 2px 2px 0 #ffd5e5; transition: transform 0.3s; display: inline-block; font-size: inherit; font-weight: inherit; }
        .logo a:hover { transform: scale(1.05); }
        .subtitle { text-align: center; color: #caa; margin-bottom: 2rem; }
        .login-box { background: #fff; padding: 2.5rem; border-radius: 24px; border: 3px solid #ffe4ec; box-shadow: 0 8px 25px rgba(255, 182, 193, 0.3); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #9a8a8a; font-size: 0.875rem; }
        .form-group input { width: 100%; padding: 0.875rem 1rem; background: #fff9fa; border: 2px solid #ffe4ec; border-radius: 50px; color: #5a4a4a; font-size: 1rem; font-family: 'Fredoka', sans-serif; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #ff6b9d; box-shadow: 0 0 20px rgba(255, 107, 157, 0.3); }
        .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #ff6b9d 0%, #ff9ec4 100%); color: #fff; border: none; border-radius: 50px; font-size: 1rem; font-weight: 600; font-family: 'Fredoka', sans-serif; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4); }
        .btn:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(255, 107, 157, 0.5); }
        .links { margin-top: 1.5rem; text-align: center; }
        .links a { color: #caa; text-decoration: none; font-size: 0.875rem; }
        .links a:hover { color: #ff6b9d; }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="home-link">Saint Code ✨</a>
    </div>
    <div class="login-container">
        <div class="logo"><a href="/">Saint Code ✨</a></div>
        <p class="subtitle">注册 AI API 平台账号</p>
        <div class="login-box">
            <form id="register-form">
                <div class="form-group">
                    <label>✨ 用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group" id="email-group" style="display:none;">
                    <label>📧 邮箱</label>
                    <input type="email" id="email" placeholder="请输入邮箱">
                </div>
                <div class="form-group" id="code-group" style="display:none;">
                    <label>🔢 验证码</label>
                    <div style="display:flex;gap:0.5rem;">
                        <input type="text" id="verification-code" placeholder="请输入验证码" style="flex:1;">
                        <button type="button" class="btn" id="send-code-btn" style="width:auto;padding:0.875rem 1rem;white-space:nowrap;">发送验证码</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>🔑 密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label>🔑 确认密码</label>
                    <input type="password" id="password2" placeholder="请再次输入密码" required>
                </div>
                <div id="error-msg" style="color:#ff6b9d;font-size:0.875rem;margin-bottom:1rem;display:none;"></div>
                <div id="success-msg" style="color:#52c41a;font-size:0.875rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" class="btn" id="register-btn">🚀 注册</button>
            </form>
            <div class="links">
                <a href="/login">🔙 已有账号？登录</a>
            </div>
        </div>
    </div>
    <script src="/theme/register.js"></script>
</body>
</html>
