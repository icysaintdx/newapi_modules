<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - Saint Code</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Fredoka', sans-serif; background: linear-gradient(135deg, #fff5f5 0%, #f0f9ff 50%, #f5f0ff 100%); color: #5a4a4a; min-height: 100vh; }
        .header { background: rgba(255, 255, 255, 0.9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 3px solid #ffb6c1; box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3); }
        .logo { font-size: 1.5rem; font-weight: 700; color: #ff6b9d; text-shadow: 2px 2px 0 #ffd5e5; }
        .nav a { color: #8a7a7a; text-decoration: none; margin-left: 1.5rem; font-weight: 500; padding: 0.5rem 1rem; border-radius: 20px; transition: all 0.3s; }
        .nav a:hover { background: #ffe4ec; color: #ff6b9d; }
        .container { max-width: 800px; margin: 0 auto; padding: 8rem 2rem 4rem; }
        h1 { font-size: 2.5rem; margin-bottom: 2rem; color: #ff6b9d; text-shadow: 2px 2px 0 #ffd5e5; }
        .content { background: #fff; padding: 2rem; border-radius: 24px; border: 3px solid #ffe4ec; line-height: 1.8; color: #9a8a8a; box-shadow: 0 8px 25px rgba(255, 182, 193, 0.2); }
        .content h2 { color: #ff6b9d; margin: 2rem 0 1rem; }
        .content p { margin-bottom: 1rem; }
        .logo-image {
            text-align: center;
            margin-bottom: 3rem;
        }
        .logo-image img {
            max-width: 200px;
            height: auto;
            border-radius: 16px;
        }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <header class="header">
        <a href="/" style="text-decoration:none;display:inline-block;"><div class="logo">🎀 Saint Code</div></a>
        <nav class="nav">
            <a href="/">🏠 首页</a>
            <a href="/about">📖 关于</a>
            <a href="/login">🔐 登录</a>
        </nav>
    </header>
    <div class="container">
        <div class="logo-image">
            <img src="https://isaint.cc/static-assets/logo.png" alt="Saint Code Logo">
        </div>
        <h1>📖 关于 Saint Code</h1>
        <div class="content">
            <p>Saint Code 是一个专业的 AI API 聚合平台，致力于为开发者提供最优质的人工智能服务～ 💖</p>
            <h2>✨ 我们的使命</h2>
            <p>简化 AI 技术的使用门槛，让任何人都能轻松接入全球顶尖的 AI 能力！</p>
            <h2>🌟 核心优势</h2>
            <p>• 统一的 API 接口，兼容 OpenAI 协议<br>• 40+ AI 提供商一键接入 ✨<br>• 智能路由优化，确保最佳性价比<br>• 企业级安全防护，数据隐私保障 🛡️</p>
            <h2>📮 联系我们</h2>
            <p>邮箱: support@isaint.cc</p>
        </div>
    </div>
</body>
</html>
