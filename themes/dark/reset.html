<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - Saint Code</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; align-items: center; z-index: 100; }
        .top-bar .home-link { text-decoration: none; font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: opacity 0.3s; }
        .top-bar .home-link:hover { opacity: 0.7; }
        .reset-container { width: 100%; max-width: 420px; padding: 2rem; padding-top: 5rem; }
        .logo { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .logo a { text-decoration: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: opacity 0.3s; }
            font-size: inherit;
            font-weight: inherit;
        .logo a:hover { opacity: 0.7; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; }
        .reset-box { background: #1a1a1a; padding: 2.5rem; border-radius: 16px; border: 1px solid #333; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #aaa; font-size: 0.875rem; }
        .form-group input { width: 100%; padding: 0.875rem 1rem; background: #0d0d0d; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4); }
        .links { margin-top: 1.5rem; text-align: center; }
        .links a { color: #666; text-decoration: none; font-size: 0.875rem; }
        .links a:hover { color: #667eea; }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <div class="top-bar"><a href="/" class="home-link">Saint Code</a></div>
    <div class="reset-container">
        <div class="logo"><a href="/">Saint Code</a></div>
        <p class="subtitle">重置你的密码</p>
        <div class="reset-box">
            <form id="reset-form">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="请输入注册邮箱" required>
                </div>
                <div id="error-msg" style="color:#ff6b6b;font-size:0.875rem;margin-bottom:1rem;display:none;"></div>
                <div id="success-msg" style="color:#52c41a;font-size:0.875rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" class="btn" id="reset-btn">发送重置邮件</button>
            </form>
            <div class="links">
                <a href="/login">返回登录</a> · <a href="/register">注册账号</a>
            </div>
        </div>
    </div>
    <script>
    (function(){
        var form=document.getElementById('reset-form');
        var btn=document.getElementById('reset-btn');
        var err=document.getElementById('error-msg');
        var suc=document.getElementById('success-msg');
        form.addEventListener('submit',function(e){
            e.preventDefault();
            btn.disabled=true;
            btn.textContent='发送中...';
            err.style.display='none';
            suc.style.display='none';
            fetch('/api/reset_password?email='+encodeURIComponent(document.getElementById('email').value)).then(function(r){return r.json();}).then(function(d){
                if(d.success){
                    suc.textContent='重置邮件已发送，请检查邮箱';
                    suc.style.display='block';
                    btn.textContent='已发送';
                }else{
                    err.textContent=d.message||'发送失败';
                    err.style.display='block';
                    btn.disabled=false;
                    btn.textContent='发送重置邮件';
                }
            }).catch(function(){
                err.textContent='网络错误，请重试';
                err.style.display='block';
                btn.disabled=false;
                btn.textContent='发送重置邮件';
            });
        });
    })();
    </script>
</body>
</html>
