<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 - Saint Code</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: rgba(26, 26, 26, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .content {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #333;
            line-height: 1.8;
            color: #aaa;
        }
        .content h2 {
            color: #fff;
            margin: 2rem 0 1rem;
        }
        .content p { margin-bottom: 1rem; }
        .logo-image {
            text-align: center;
            margin-bottom: 3rem;
        }
        .logo-image img {
            max-width: 200px;
            height: auto;
            border-radius: 16px;
        }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <header class="header">
        <a href="/" style="text-decoration:none;display:inline-block;"><div class="logo">✨ Saint Code</div></a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/login">登录</a>
        </nav>
    </header>
    <div class="container">
        <div class="logo-image">
            <img src="https://isaint.cc/static-assets/logo.png" alt="Saint Code Logo">
        </div>
        <h1>关于 Saint Code</h1>
        <div class="content">
            <p>Saint Code 是一个专业的 AI API 聚合平台，致力于为开发者提供最优质的人工智能服务。</p>
            <h2>我们的使命</h2>
            <p>简化 AI 技术的使用门槛，让任何人都能轻松接入全球顶尖的 AI 能力。</p>
            <h2>核心优势</h2>
            <p>• 统一的 API 接口，兼容 OpenAI 协议<br>• 40+ AI 提供商一键接入<br>• 智能路由优化，确保最佳性价比<br>• 企业级安全防护，数据隐私保障</p>
            <h2>联系我们</h2>
            <p>邮箱: support@isaint.cc</p>
        </div>
    </div>
</body>
</html>
