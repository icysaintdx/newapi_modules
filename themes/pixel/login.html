<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - SAINT CODE</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'Press Start 2P', cursive; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 16px 16px; pointer-events: none; z-index: -1; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; align-items: center; z-index: 100; }
        .top-bar .home-link { text-decoration: none; font-family: 'Press Start 2P', cursive; font-size: 1rem; color: #4a9eff; text-shadow: 3px 3px 0 #1a1a2e; transition: all 0.2s; }
        .top-bar .home-link:hover { color: #ffd93d; }
        .login-container { width: 100%; max-width: 400px; padding: 2rem; padding-top: 5rem; position: relative; z-index: 1; }
        
        /* 马里奥左右交替动画 */
        .mario-left, .mario-right {
            position: fixed;
            width: 250px;
            height: 250px;
            pointer-events: none;
            z-index: 0;
        }
        
        .mario-left {
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .mario-right {
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .mario-left img, .mario-right img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            opacity: 0;
        }
        
        /* 左侧显示 1, 3, 5 (奇数) - 18秒循环 */
        .mario-left img:nth-child(1) {
            animation: fadeInOutSlow 18s infinite;
            animation-delay: 0s;
        }
        
        .mario-left img:nth-child(3) {
            animation: fadeInOutSlow 18s infinite;
            animation-delay: 6s;
        }
        
        .mario-left img:nth-child(5) {
            animation: fadeInOutSlow 18s infinite;
            animation-delay: 12s;
        }
        
        /* 右侧显示 2, 4, 6 (偶数) */
        .mario-right img:nth-child(2) {
            animation: fadeInOutSlow 18s infinite;
            animation-delay: 3s;
        }
        
        .mario-right img:nth-child(4) {
            animation: fadeInOutSlow 18s infinite;
            animation-delay: 9s;
        }
        
        .mario-right img:nth-child(6) {
            animation: fadeInOutSlow 18s infinite;
            animation-delay: 15s;
        }
        
        @keyframes fadeInOutSlow {
            0%, 100% { opacity: 0; transform: scale(0.9); }
            11.11% { opacity: 1; transform: scale(1); }
            27.78% { opacity: 1; transform: scale(1); }
            38.89% { opacity: 0; transform: scale(0.9); }
        }
        
        /* 响应式：小屏幕隐藏马里奥 */
        @media (max-width: 768px) {
            .mario-left, .mario-right { display: none; }
        }
        .logo { text-align: center; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .logo a { text-decoration: none; color: #4a9eff; text-shadow: 3px 3px 0 #1a1a2e; transition: color 0.2s; font-size: inherit; font-weight: inherit; }
            font-size: inherit;
            font-weight: inherit;
        .logo a:hover { color: #ffd93d; }
        .subtitle { text-align: center; font-size: 0.6rem; color: #444; margin-bottom: 2rem; }
        .login-box { background: #16162a; padding: 2rem; padding-top: 5rem; border: 4px solid #333; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.6rem; color: #666; }
        .form-group input { width: 100%; padding: 0.75rem; background: #1a1a2e; border: 4px solid #333; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 0.6rem; }
        .form-group input:focus { outline: none; border-color: #4a9eff; }
        .btn { width: 100%; padding: 1rem; background: #4a9eff; color: #fff; border: 4px solid #fff; font-family: 'Press Start 2P', cursive; font-size: 0.7rem; cursor: pointer; box-shadow: 6px 6px 0 #1a1a2e; }
        .btn:hover { transform: translate(3px, 3px); box-shadow: 3px 3px 0 #1a1a2e; }
        .links { margin-top: 1.5rem; text-align: center; }
        .links a { color: #444; text-decoration: none; font-size: 0.5rem; }
        .links a:hover { color: #4a9eff; }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <!-- 左侧马里奥动画 -->
    <div class="mario-left">
        <img src="/theme/pixel/1.webp" alt="Mario">
        <img src="/theme/pixel/2.webp" alt="Mario">
        <img src="/theme/pixel/3.webp" alt="Mario">
        <img src="/theme/pixel/4.webp" alt="Mario">
        <img src="/theme/pixel/5.webp" alt="Mario">
        <img src="/theme/pixel/6.webp" alt="Mario">
    </div>
    
    <!-- 右侧马里奥动画 -->
    <div class="mario-right">
        <img src="/theme/pixel/1.webp" alt="Mario">
        <img src="/theme/pixel/2.webp" alt="Mario">
        <img src="/theme/pixel/3.webp" alt="Mario">
        <img src="/theme/pixel/4.webp" alt="Mario">
        <img src="/theme/pixel/5.webp" alt="Mario">
        <img src="/theme/pixel/6.webp" alt="Mario">
    </div>
    
    <div class="top-bar">
        <a href="/" class="home-link">SAINT CODE</a>
    </div>
    <div class="login-container">
        <div class="logo"><a href="/">SAINT CODE</a></div>
        <p class="subtitle">SYSTEM LOGIN</p>
        <div class="login-box">
            <form id="login-form">
                <div class="form-group">
                    <label>◆ USERNAME</label>
                    <input type="text" id="username" placeholder="ENTER_USERNAME" required>
                </div>
                <div class="form-group">
                    <label>◆ PASSWORD</label>
                    <input type="password" id="password" placeholder="ENTER_PASSWORD" required>
                </div>
                <div id="error-msg" style="color:#ff6b6b;font-size:0.5rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" class="btn" id="login-btn">LOGIN</button>
            </form>
            <div class="links">
                <a href="/register">REGISTER</a> | <a href="/reset">FORGOT?</a>
            </div>
        </div>
    </div>
    <script src="/theme/auth.js"></script>
</body>
</html>
