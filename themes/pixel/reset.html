<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET PASSWORD - SAINT CODE</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'Press Start 2P', cursive; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 16px 16px; pointer-events: none; z-index: -1; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; align-items: center; z-index: 100; }
        .top-bar .home-link { text-decoration: none; font-family: 'Press Start 2P', cursive; font-size: 1rem; color: #4a9eff; text-shadow: 3px 3px 0 #1a1a2e; transition: all 0.2s; }
        .top-bar .home-link:hover { color: #ffd93d; }
        .reset-container { width: 100%; max-width: 420px; padding: 2rem; padding-top: 5rem; }
        .logo { text-align: center; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .logo a { text-decoration: none; color: #4a9eff; text-shadow: 3px 3px 0 #1a1a2e; transition: color 0.2s; font-size: inherit; font-weight: inherit; }
            font-size: inherit;
            font-weight: inherit;
        .logo a:hover { color: #ffd93d; }
        .subtitle { text-align: center; font-size: 0.6rem; color: #444; margin-bottom: 2rem; }
        .reset-box { background: #16162a; padding: 2rem; border: 4px solid #333; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.6rem; color: #666; }
        .form-group input { width: 100%; padding: 0.75rem; background: #1a1a2e; border: 4px solid #333; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 0.6rem; }
        .form-group input:focus { outline: none; border-color: #4a9eff; }
        .btn { width: 100%; padding: 1rem; background: #4a9eff; color: #fff; border: 4px solid #fff; font-family: 'Press Start 2P', cursive; font-size: 0.7rem; cursor: pointer; box-shadow: 6px 6px 0 #1a1a2e; }
        .btn:hover { transform: translate(3px, 3px); box-shadow: 3px 3px 0 #1a1a2e; }
        .links { margin-top: 1.5rem; text-align: center; }
        .links a { color: #444; text-decoration: none; font-size: 0.5rem; }
        .links a:hover { color: #4a9eff; }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <div class="top-bar"><a href="/" class="home-link">SAINT CODE</a></div>
    <div class="reset-container">
        <div class="logo"><a href="/">SAINT CODE</a></div>
        <p class="subtitle">RESET PASSWORD</p>
        <div class="reset-box">
            <form id="reset-form">
                <div class="form-group">
                    <label>◆ EMAIL</label>
                    <input type="email" id="email" placeholder="ENTER_EMAIL" required>
                </div>
                <div id="error-msg" style="color:#ff6b6b;font-size:0.5rem;margin-bottom:1rem;display:none;"></div>
                <div id="success-msg" style="color:#22c55e;font-size:0.5rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" class="btn" id="reset-btn">SEND EMAIL</button>
            </form>
            <div class="links">
                <a href="/login">BACK TO LOGIN</a> | <a href="/register">REGISTER</a>
            </div>
        </div>
    </div>
    <script>
    (function(){
        var form=document.getElementById('reset-form');
        var btn=document.getElementById('reset-btn');
        var err=document.getElementById('error-msg');
        var suc=document.getElementById('success-msg');
        form.addEventListener('submit',function(e){
            e.preventDefault();
            btn.disabled=true;
            btn.textContent='SENDING...';
            err.style.display='none';
            suc.style.display='none';
            fetch('/api/reset_password?email='+encodeURIComponent(document.getElementById('email').value)).then(function(r){return r.json();}).then(function(d){
                if(d.success){
                    suc.textContent='RESET EMAIL SENT!';
                    suc.style.display='block';
                    btn.textContent='SENT';
                }else{
                    err.textContent=d.message||'FAILED';
                    err.style.display='block';
                    btn.disabled=false;
                    btn.textContent='SEND EMAIL';
                }
            }).catch(function(){
                err.textContent='NETWORK_ERROR';
                err.style.display='block';
                btn.disabled=false;
                btn.textContent='SEND EMAIL';
            });
        });
    })();
    </script>
</body>
</html>
