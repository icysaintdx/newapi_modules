<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="design-page" content="true">

    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTICES - SAINT CODE</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'Press Start 2P', cursive; background: #1a1a2e; color: #fff; min-height: 100vh; }
        .header { background: #16162a; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 4px solid #4a9eff; }

        .nav a { color: #888; text-decoration: none; margin-left: 1.5rem; font-size: 0.6rem; }
        .container { max-width: 700px; margin: 0 auto; padding: 8rem 2rem 4rem; }
        h1 { font-size: 1.5rem; margin-bottom: 2rem; }
        .notice-board { display: flex; flex-direction: column; gap: 1rem; }
        .notice-item { background: #16162a; padding: 1.5rem; border: 4px solid #333; }
        .notice-item.pinned { border-left: 4px solid #4a9eff; }
        .notice-item h3 { font-size: 0.7rem; margin-bottom: 0.75rem; color: #ffd93d; }
        .notice-item p { font-size: 0.55rem; color: #666; line-height: 1.8; margin-bottom: 0.5rem; }
        .notice-meta { font-size: 0.5rem; color: #444; }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">SAINT CODE</div>
        <nav class="nav">

        </nav>

    <div class="container">
        <h1>◆ NOTICES</h1>

            <div class="notice-item pinned">

                <p>SAINT CODE AI API PLATFORM IS OFFICIALLY LAUNCHED!</p>
                <div class="notice-meta">2026-04-01 ◆ PINNED</div>
            </div>
            <div class="notice-item">
                <h3>[UPDATE] MODEL SUPPORT</h3>
                <p>PLATFORM NOW SUPPORTS GEMINI 3.1 PRO</p>
