<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET PASSWORD - SAINT CODE</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0a0e17; color: #00f0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 49%, rgba(0,240,255,0.03) 50%, transparent 51%), linear-gradient(transparent 49%, rgba(0,240,255,0.03) 50%, transparent 51%); background-size: 50px 50px; pointer-events: none; z-index: -1; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; align-items: center; z-index: 100; }
        .top-bar .home-link { text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.5); letter-spacing: 2px; transition: all 0.3s; }
        .top-bar .home-link:hover { text-shadow: 0 0 20px rgba(0,240,255,0.8); }
        .reset-container { width: 100%; max-width: 420px; padding: 2rem; padding-top: 5rem; }
        .logo { text-align: center; font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 2px; }
        .logo a { text-decoration: none; color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.5); transition: opacity 0.3s; font-size: inherit; font-weight: inherit; }
            font-size: inherit;
            font-weight: inherit;
        .logo a:hover { opacity: 0.7; }
        .logo span { color: #ff00aa; text-shadow: 0 0 10px rgba(255,0,170,0.5); }
        .subtitle { text-align: center; color: rgba(0,240,255,0.5); margin-bottom: 2rem; letter-spacing: 1px; }
        .reset-box { background: rgba(10,14,23,0.8); padding: 2.5rem; border-radius: 8px; border: 1px solid rgba(0,240,255,0.3); box-shadow: 0 0 15px rgba(0,240,255,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: rgba(0,240,255,0.7); font-size: 0.875rem; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 0.875rem 1rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,240,255,0.3); border-radius: 4px; color: #00f0ff; font-size: 1rem; font-family: 'Rajdhani', sans-serif; }
        .form-group input:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
        .btn { width: 100%; padding: 1rem; background: transparent; border: 2px solid #00f0ff; border-radius: 4px; color: #00f0ff; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; }
        .btn:hover { background: rgba(0,240,255,0.1); box-shadow: 0 0 30px rgba(0,240,255,0.5); }
        .links { margin-top: 1.5rem; text-align: center; }
        .links a { color: rgba(0,240,255,0.7); text-decoration: none; font-size: 0.875rem; }
        .links a:hover { color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.3); }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <div class="top-bar"><a href="/" class="home-link">SAINT <span>CODE</span></a></div>
    <div class="reset-container">
        <div class="logo"><a href="/">SAINT <span>CODE</span></a></div>
        <p class="subtitle">// RESET PASSWORD //</p>
        <div class="reset-box">
            <form id="reset-form">
                <div class="form-group">
                    <label>// EMAIL</label>
                    <input type="email" id="email" placeholder="ENTER_EMAIL" required>
                </div>
                <div id="error-msg" style="color:#ff00aa;font-size:0.875rem;margin-bottom:1rem;display:none;letter-spacing:1px;"></div>
                <div id="success-msg" style="color:#00f0ff;font-size:0.875rem;margin-bottom:1rem;display:none;letter-spacing:1px;"></div>
                <button type="submit" class="btn" id="reset-btn">SEND RESET EMAIL</button>
            </form>
            <div class="links">
                <a href="/login">BACK TO LOGIN</a> · <a href="/register">REGISTER</a>
            </div>
        </div>
    </div>
    <script>
    (function(){
        var form=document.getElementById('reset-form');
        var btn=document.getElementById('reset-btn');
        var err=document.getElementById('error-msg');
        var suc=document.getElementById('success-msg');
        form.addEventListener('submit',function(e){
            e.preventDefault();
            btn.disabled=true;
            btn.textContent='SENDING...';
            err.style.display='none';
            suc.style.display='none';
            fetch('/api/reset_password?email='+encodeURIComponent(document.getElementById('email').value)).then(function(r){return r.json();}).then(function(d){
                if(d.success){
                    suc.textContent='RESET EMAIL SENT, CHECK YOUR INBOX';
                    suc.style.display='block';
                    btn.textContent='SENT';
                }else{
                    err.textContent='[ERROR] '+(d.message||'FAILED');
                    err.style.display='block';
                    btn.disabled=false;
                    btn.textContent='SEND RESET EMAIL';
                }
            }).catch(function(){
                err.textContent='[ERROR] NETWORK_FAILURE';
                err.style.display='block';
                btn.disabled=false;
                btn.textContent='SEND RESET EMAIL';
            });
        });
    })();
    </script>
</body>
</html>
