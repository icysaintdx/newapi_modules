<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANNOUNCEMENTS - SAINT CODE</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0a0e17; color: #00f0ff; min-height: 100vh; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 49%, rgba(0,240,255,0.03) 50%, transparent 51%), linear-gradient(transparent 49%, rgba(0,240,255,0.03) 50%, transparent 51%); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .header { background: rgba(10, 14, 23, 0.9); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,240,255,0.3); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: #00f0ff; letter-spacing: 2px; }
        .logo span { color: #ff00aa; }
        .nav a { color: #00f0ff; text-decoration: none; margin-left: 2rem; letter-spacing: 1px; }
        .container { max-width: 800px; margin: 0 auto; padding: 8rem 2rem 4rem; position: relative; z-index: 1; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-bottom: 2rem; }
        .notice-board { display: flex; flex-direction: column; gap: 1rem; }
        .notice-item { background: rgba(10, 14, 23, 0.8); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(0,240,255,0.3); transition: all 0.3s; }
        .notice-item:hover { border-color: #00f0ff; box-shadow: 0 0 20px rgba(0,240,255,0.2); }
        .notice-item.pinned { border-left: 4px solid #00f0ff; }
        .notice-item h3 { font-size: 1.125rem; margin-bottom: 0.5rem; color: #00f0ff; }
        .notice-item p { color: rgba(0,240,255,0.7); line-height: 1.6; margin-bottom: 0.75rem; }
        .notice-meta { display: flex; gap: 1rem; font-size: 0.75rem; color: rgba(0,240,255,0.5); }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">SAINT <span>CODE</span></div>
        <nav class="nav">
            <a href="/">HOME</a>
            <a href="/announcement">ANNOUNCEMENTS</a>
            <a href="/about">ABOUT</a>
            <a href="/login">LOGIN</a>
        </nav>
    </header>
    <div class="container">
        <h1>// SYSTEM ANNOUNCEMENTS</h1>
        <div class="notice-board">
            <div class="notice-item pinned">
                <h3>🎉 SYSTEM ONLINE</h3>
                <p>Saint Code AI API Platform is officially launched! Welcome to use.</p>
                <div class="notice-meta"><span>2026-04-01</span><span>PINNED</span></div>
            </div>
            <div class="notice-item">
                <h3>NEW MODEL SUPPORT</h3>
                <p>Platform now supports Gemini 3.1 Pro. Welcome to experience.</p>
                <div class="notice-meta"><span>2026-04-02</span></div>
            </div>
        </div>
    </div>
</body>
</html>
