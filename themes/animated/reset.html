<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - Saint Code</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* ===== LEFT PANEL ===== */
        .left-panel {
            position: relative; width: 55%; min-width: 500px;
            background: linear-gradient(135deg, #6C3FF5e6, #6C3FF5, #6C3FF5cc);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 48px; color: white; overflow: hidden;
        }
        .deco-grid {
            position: absolute; inset: 0; pointer-events: none;
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .deco-circle { position: absolute; border-radius: 50%; filter: blur(48px); pointer-events: none; }
        .deco-circle-1 { top: 25%; right: 25%; width: 256px; height: 256px; background: rgba(255,255,255,0.1); }
        .deco-circle-2 { bottom: 25%; left: 25%; width: 384px; height: 384px; background: rgba(255,255,255,0.05); }

        .brand { position: relative; z-index: 20; display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; }
        .brand-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
        .characters-area { position: relative; z-index: 20; display: flex; align-items: flex-end; justify-content: center; height: 500px; }
        .footer-links { position: relative; z-index: 20; display: flex; gap: 32px; font-size: 14px; }
        .footer-links a { color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: white; }

        /* ===== RIGHT PANEL ===== */
        .right-panel { flex: 1; display: flex; align-items: center; justify-content: center; background: #fafafa; padding: 2rem; }
        .form-container { width: 100%; max-width: 400px; }
        .form-container h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .form-container .subtitle { color: #888; margin-bottom: 32px; font-size: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; color: #333; font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-group input:focus { outline: none; border-color: #6C3FF5; box-shadow: 0 0 0 3px rgba(108, 63, 245, 0.1); }
        .btn-submit { width: 100%; padding: 14px; background: #6C3FF5; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.2s; }
        .btn-submit:hover { background: #5a2fd4; transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .form-footer { margin-top: 24px; text-align: center; font-size: 14px; color: #888; }
        .form-footer a { color: #6C3FF5; text-decoration: none; font-weight: 500; }
        .form-footer a:hover { text-decoration: underline; }

        /* ===== CHARACTERS ===== */
        .characters-container { position: relative; width: 550px; height: 400px; }
        .char { position: absolute; bottom: 0; transition: all 0.7s ease-in-out; transform-origin: bottom center; }
        .purple { left: 70px; width: 180px; height: 420px; background: #6C3FF5; border-radius: 10px 10px 0 0; z-index: 1; clip-path: none; }
        .black { left: 240px; width: 120px; height: 310px; background: #2D2D2D; border-radius: 8px 8px 0 0; z-index: 2; }
        .orange { left: 0; width: 240px; height: 200px; background: #FF8433; border-radius: 120px 120px 0 0; z-index: 3; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), height 0.7s ease-in-out, border-radius 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        .yellow { left: 310px; width: 140px; height: 230px; background: #E6CA0A; border-radius: 70px 70px 0 0; z-index: 4; }

        /* Eyes container */
        .eyes { position: absolute; display: flex; gap: 12px; align-items: center; transition: left 0.7s ease-in-out, top 0.7s ease-in-out; }
        .orange .eyes { gap: 36px; }

        /* Eyeball */
        .eyeball {
            border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center;
            transition: height 0.15s, width 0.15s, margin-top 0.15s; overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); flex: 0 0 auto;
        }
        .orange .eyeball, .yellow .eyeball { background: #111; box-shadow: none; }

        /* Pupil */
        .pupil {
            border-radius: 50%; background: #2D2D2D;
            transition: transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .orange .pupil, .yellow .pupil { background: #fff; }

        /* Mouth */
        .char-mouth { position: absolute; transition: all 0.4s ease; }
        .purple .char-mouth { width: 16px; height: 4px; border-radius: 2px; background: #2D2D2D; }
        .orange .char-mouth { width: 24px; height: 12px; border-radius: 0 0 24px 24px; background: #2D2D2D; }
        .yellow .char-mouth { width: 80px; height: 4px; border-radius: 4px; background: #2D2D2D; }

        /* Black blush */
        .blush {
            position: absolute; border-radius: 50%; pointer-events: none; z-index: 3;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, transparent 35%),
                        radial-gradient(circle at 65% 55%, rgba(255,255,255,0.55) 0%, transparent 25%),
                        radial-gradient(ellipse at center, #ff5c8a 0%, #ff85a0 50%, transparent 70%);
            transition: all 0.7s ease-in-out; width: 18px; height: 12px; opacity: 0.55; filter: blur(4px);
        }

        /* Orange glasses - positioned as separate overlay that follows eyes */
        .glasses-wrap { position: absolute; pointer-events: none; z-index: 10; display: flex; align-items: center; gap: 0; transition: left 0.7s ease-in-out, top 0.7s ease-in-out, transform 0.5s ease-in-out; }
        .gl-arm { width: 10px; height: 4px; background: #1a1a1a; border-radius: 2px; flex-shrink: 0; }
        .gl-lens { width: 34px; height: 24px; background: rgba(200,200,255,0.08); border: 3px solid #1a1a1a; border-radius: 8px; flex-shrink: 0; }
        .gl-bridge { width: 8px; height: 6px; background: #1a1a1a; border-radius: 3px; margin: 0 -1px; flex-shrink: 0; }

        @media (max-width: 900px) { .left-panel { display: none; } .right-panel { width: 100%; } }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <!-- LEFT PANEL -->
    <div class="left-panel">
        <div class="deco-grid"></div>
        <div class="deco-circle deco-circle-1"></div>
        <div class="deco-circle deco-circle-2"></div>
        <div class="brand">
            <a href="/" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;">
                <div class="brand-icon">✨</div>
                <span>Saint Code</span>
            </a>
        </div>
        <div class="characters-area">
            <div class="characters-container">
                <div class="char purple" id="purple">
                    <div class="eyes" id="purple-eyes">
                        <div class="eyeball" id="pe1" style="width:18px;height:18px"><div class="pupil" style="width:8px;height:8px"></div></div>
                        <div class="eyeball" id="pe2" style="width:18px;height:18px"><div class="pupil" style="width:8px;height:8px"></div></div>
                    </div>
                    <div class="char-mouth" id="purple-mouth"></div>
                </div>
                <div class="char black" id="black">
                    <div class="eyes" id="black-eyes">
                        <div class="eyeball" id="be1" style="width:16px;height:16px"><div class="pupil" style="width:6px;height:6px"></div></div>
                        <div class="eyeball" id="be2" style="width:16px;height:16px"><div class="pupil" style="width:6px;height:6px"></div></div>
                    </div>
                    <div class="blush" id="black-blush-l"></div>
                    <div class="blush" id="black-blush-r"></div>
                </div>
                <div class="char orange" id="orange">
                    <div class="eyes" id="orange-eyes">
                        <div class="eyeball" id="oe1" style="width:12px;height:12px"><div class="pupil" style="width:5px;height:5px"></div></div>
                        <div class="eyeball" id="oe2" style="width:12px;height:12px"><div class="pupil" style="width:5px;height:5px"></div></div>
                    </div>
                    <div class="glasses-wrap" id="orange-glasses">
                        <div class="gl-arm"></div><div class="gl-lens"></div><div class="gl-bridge"></div><div class="gl-lens"></div><div class="gl-arm"></div>
                    </div>
                    <div class="char-mouth" id="orange-mouth"></div>
                </div>
                <div class="char yellow" id="yellow">
                    <div class="eyes" id="yellow-eyes">
                        <div class="eyeball" id="ye1" style="width:12px;height:12px"><div class="pupil" style="width:5px;height:5px"></div></div>
                        <div class="eyeball" id="ye2" style="width:12px;height:12px"><div class="pupil" style="width:5px;height:5px"></div></div>
                    </div>
                    <div class="char-mouth" id="yellow-mouth"></div>
                </div>
            </div>
        </div>
        <div class="footer-links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/about">Terms of Service</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- RIGHT PANEL: Reset Form -->
    <div class="right-panel">
        <div class="form-container">
            <h1>重置密码</h1>
            <p class="subtitle">输入你的注册邮箱，我们将发送重置链接</p>
            <form id="reset-form">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="请输入注册邮箱" required>
                </div>
                <div id="error-msg" style="color:#ff4d4f;font-size:14px;margin-bottom:16px;display:none;"></div>
                <div id="success-msg" style="color:#22c55e;font-size:14px;margin-bottom:16px;display:none;"></div>
                <button type="submit" class="btn-submit" id="reset-btn">发送重置邮件</button>
            </form>
            <div class="form-footer">
                <a href="/login">返回登录</a> · <a href="/register">注册账号</a>
            </div>
        </div>
    </div>

    <script src="/theme/animated/characters.js"></script>
    <script>
    // Reset form
    (function(){var form=document.getElementById('reset-form');var btn=document.getElementById('reset-btn');var err=document.getElementById('error-msg');var suc=document.getElementById('success-msg');form.addEventListener('submit',function(e){e.preventDefault();btn.disabled=true;btn.textContent='发送中...';err.style.display='none';suc.style.display='none';fetch('/api/reset_password?email='+encodeURIComponent(document.getElementById('email').value)).then(function(r){return r.json();}).then(function(d){if(d.success){suc.textContent='重置邮件已发送，请检查邮箱';suc.style.display='block';btn.textContent='已发送'}else{if (window._charSetError) window._charSetError(true);err.textContent=d.message||'发送失败';err.style.display='block';btn.disabled=false;btn.textContent='发送重置邮件'}}).catch(function(){if (window._charSetError) window._charSetError(true);err.textContent='网络错误，请重试';err.style.display='block';btn.disabled=false;btn.textContent='发送重置邮件'})})})();
    </script>
</body>
</html>
