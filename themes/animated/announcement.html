<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="design-page" content="true">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告 - Saint Code</title>
    <link rel="icon" type="image/x-icon" href="/themes/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/themes/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/themes/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: rgba(26, 26, 26, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .notice-board {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .notice-item {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #333;
            transition: border-color 0.3s;
        }
        .notice-item:hover { border-color: #667eea; }
        .notice-item.pinned {
            border-left: 4px solid #667eea;
        }
        .notice-item h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }
        .notice-item p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }
        .notice-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #666;
        }
    </style>
    <script src="/theme/theme-switcher.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">Saint Code</div>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/announcement">公告</a>
            <a href="/about">关于</a>
            <a href="/login">登录</a>
        </nav>
    </header>
    <div class="container">
        <h1>公告</h1>
        <div class="notice-board">
            <div class="notice-item pinned">
                <h3>🎉 平台上线通知</h3>
                <p>Saint Code AI API 平台正式上线！欢迎大家使用。</p>
                <div class="notice-meta">
                    <span>2026-04-01</span>
                    <span>置顶</span>
                </div>
            </div>
            <div class="notice-item">
                <h3>新增 Gemini 模型支持</h3>
                <p>平台现已支持 Gemini 3.1 Pro，欢迎体验。</p>
                <div class="notice-meta">
                    <span>2026-04-02</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
